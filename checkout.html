<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оформление заказа - ArtPhone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">...</div>
    
    <div class="checkout-container">
        <h1>Оформление заказа</h1>
        
        <div class="checkout-content">
            <div class="checkout-form">
                <h2>Контактные данные</h2>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Имя получателя</label>
                        <input type="text" id="recipientName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" id="recipientPhone" required>
                    </div>
                    
                    <h2>Адрес доставки</h2>
                    <div class="form-group">
                        <label>Город</label>
                        <input type="text" id="city" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Улица</label>
                            <input type="text" id="street" required>
                        </div>
                        <div class="form-group">
                            <label>Дом</label>
                            <input type="text" id="house" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Квартира</label>
                            <input type="text" id="apartment">
                        </div>
                        <div class="form-group">
                            <label>Индекс</label>
                            <input type="text" id="zipcode">
                        </div>
                    </div>
                    
                    <h2>Способ оплаты</h2>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="card" checked>
                            <span>Банковской картой онлайн</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="cash">
                            <span>Наличными при получении</span>
                        </label>
                    </div>
                </form>
            </div>
            
            <div class="order-summary">
                <h3>Ваш заказ</h3>
                <div id="checkoutItems"></div>
                <div class="summary-row">
                    <span>Товары:</span>
                    <span id="checkoutTotalItems">0</span>
                </div>
                <div class="summary-row total">
                    <span>Итого:</span>
                    <span id="checkoutTotalSum">0 ₽</span>
                </div>
                <button class="btn btn-primary" id="placeOrderBtn">Подтвердить заказ</button>
            </div>
        </div>
    </div>
    
    <div class="footer">...</div>
    <script src="script.js"></script>
</body>
</html>
